# =============================================================================
# Spring Boot 配置文件 —— 整个应用的"总开关"
#
# 新手必读：这个文件告诉 Spring Boot 四件事
#   1. 应用叫什么名字                (spring.application.name)
#   2. 启动后监听哪个端口              (server.port)
#   3. 连接哪个数据库                (spring.datasource.*)
#   4. 各组件如何工作                (spring.jpa.*, spring.servlet.* 等)
#
# 【常见问题】
# Q：启动报错 "Connection refused"，连不上数据库？
# A：检查 PostgreSQL 是否已启动，以及 url、username、password 是否正确。
#
# Q：修改了配置文件需要重启吗？
# A：需要。Spring Boot 只在启动时读取一次 application.properties。
# =============================================================================
spring.application.name=attendance-system

# ==============================
# 服务端口
# ==============================
# 默认为 8080，如果被占用可以改成其他（如 8081）
server.port=8080

# ==============================
# 数据源配置（连接 PostgreSQL）
# ==============================
spring.datasource.driver-class-name=org.postgresql.Driver
# 连接地址格式：jdbc:postgresql://主机地址:端口/数据库名
# 如果你的 PostgreSQL 在默认端口 5432，改成 localhost:5432
spring.datasource.url=jdbc:postgresql://localhost:5433/springboot_course
spring.datasource.username=postgres
spring.datasource.password=123456

# ==============================
# JPA / Hibernate 配置
# ==============================

# ddl-auto 有四个常用值：
#   create     → 每次启动删表重建（开发时方便，但会丢失数据）
#   create-drop→ 启动创建，关闭删除（用于测试）
#   update     → 实体变了就改表结构（推荐，不会丢数据）
#   validate   → 只验证实体和表结构是否匹配，不修改
spring.jpa.hibernate.ddl-auto=update

# 控制台打印 Hibernate 生成的 SQL（方便调试）
spring.jpa.show-sql=true

# 格式化打印出来的 SQL（更易读）
spring.jpa.properties.hibernate.format_sql=true

# 数据库方言：告诉 Hibernate 用 PostgreSQL 的语法
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# 日志配置
# ==============================
# 打印 SQL 中的参数值（方便看到实际插入/查询了什么）
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# ==============================
# 文件上传配置
# ==============================

# 单个文件最大 10MB
spring.servlet.multipart.max-file-size=10MB

# 一次请求的总大小限制（表单 + 多个文件），要大于 max-file-size
spring.servlet.multipart.max-request-size=50MB

# 文件写入磁盘的阈值：小于 2MB 的文件暂存在内存中
spring.servlet.multipart.file-size-threshold=2MB

# ==============================
# 自定义配置
# ==============================
# 文件上传后存放的目录（当前项目根目录下的 uploads/ 文件夹）
file.upload.path=./uploads/