<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>考勤统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-4">考勤统计</h2>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/attendance/statistics}" method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">开始日期</label>
                    <input type="date" class="form-control" name="startDate" th:value="${startDate}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">结束日期</label>
                    <input type="date" class="form-control" name="endDate" th:value="${endDate}">
                </div>
                <div class="col-md-4 d-grid">
                    <button type="submit" class="btn btn-primary">查询统计</button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div th:if="${statistics.startDate == null or statistics.endDate == null}" class="alert alert-secondary">
        请选择日期范围后进行统计。
    </div>

    <div class="row g-3 mb-4" th:if="${statistics.startDate != null and statistics.endDate != null}">
        <div class="col-md-3">
            <div class="card text-bg-light shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">统计范围</h6>
                    <p class="card-text mb-0">
                        <span th:text="${statistics.startDate}"></span>
                        ~
                        <span th:text="${statistics.endDate}"></span>
                    </p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-bg-primary shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">总考勤次数</h6>
                    <h3 th:text="${statistics.rangeTotalCount}">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-bg-success shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">出勤次数</h6>
                    <h3 th:text="${statistics.rangePresentCount}">0</h3>
                    <small>(NORMAL / LATE / EARLY)</small>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-bg-danger shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">缺勤次数</h6>
                    <h3 th:text="${statistics.rangeAbsentCount}">0</h3>
                    <small>(ABSENT)</small>
                </div>
            </div>
        </div>

        <div class="col-md-12">
            <div class="card border-info shadow-sm">
                <div class="card-body">
                    <h5 class="card-title text-info">出勤率</h5>
                    <h2 th:text="${statistics.rangeAttendanceRate + '%'}">0%</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header">
            按周统计出勤率
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle text-center mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>周区间</th>
                        <th>总考勤次数</th>
                        <th>出勤次数</th>
                        <th>缺勤次数</th>
                        <th>出勤率</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${statistics.weeklyStatistics}">
                        <td th:text="${item.label}"></td>
                        <td th:text="${item.totalCount}"></td>
                        <td th:text="${item.presentCount}"></td>
                        <td th:text="${item.absentCount}"></td>
                        <td>
                            <span class="badge bg-primary" th:text="${item.attendanceRate + '%'}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(statistics.weeklyStatistics)}">
                        <td colspan="5" class="text-muted">暂无数据</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header">
            按月统计出勤率
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle text-center mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>月份</th>
                        <th>总考勤次数</th>
                        <th>出勤次数</th>
                        <th>缺勤次数</th>
                        <th>出勤率</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${statistics.monthlyStatistics}">
                        <td th:text="${item.label}"></td>
                        <td th:text="${item.totalCount}"></td>
                        <td th:text="${item.presentCount}"></td>
                        <td th:text="${item.absentCount}"></td>
                        <td>
                            <span class="badge bg-success" th:text="${item.attendanceRate + '%'}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(statistics.monthlyStatistics)}">
                        <td colspan="5" class="text-muted">暂无数据</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
