<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('考勤统计')}"></head>
<body>
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="page-shell">
<div class="container">

    <div class="card">
        <div class="card-header">📊 考勤统计</div>
        <div class="card-body">
            <form th:action="@{/attendance/statistics}" method="get" style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">
                <div>
                    <label class="form-label">开始日期</label>
                    <input type="date" class="form-input" name="startDate" th:value="${startDate}" style="width:200px;">
                </div>
                <div>
                    <label class="form-label">结束日期</label>
                    <input type="date" class="form-input" name="endDate" th:value="${endDate}" style="width:200px;">
                </div>
                <div>
                    <button type="submit" class="btn btn-primary">查询统计</button>
                </div>
            </form>
            <div class="mt-3 d-flex gap-3">
                <a th:href="@{/attendance/statistics}" class="btn btn-primary">📊 个人统计</a>
                <a th:href="@{/attendance/statistics/class}" class="btn btn-info">🏫 班级统计</a>
            </div>
        </div>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div th:if="${statistics == null or statistics.startDate == null}" class="alert alert-info" style="text-align:center;padding:40px;">
        请选择日期范围后进行统计。
    </div>

    <!-- 统计概览卡片 -->
    <div class="stats-grid" th:if="${statistics != null and statistics.startDate != null}">
        <div class="stat-card primary">
            <div class="stat-label">统计范围</div>
            <div class="stat-value" style="font-size:16px;">
                <span th:text="${statistics.startDate}"></span> ~ <span th:text="${statistics.endDate}"></span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-label">总考勤次数</div>
            <div class="stat-value" style="color:var(--primary);" th:text="${statistics.rangeTotalCount}">0</div>
        </div>
        <div class="stat-card success">
            <div class="stat-label">出勤次数</div>
            <div class="stat-value" th:text="${statistics.rangePresentCount}">0</div>
            <div class="stat-sub">NORMAL / LATE / EARLY</div>
        </div>
        <div class="stat-card danger">
            <div class="stat-label">缺勤次数</div>
            <div class="stat-value" th:text="${statistics.rangeAbsentCount}">0</div>
            <div class="stat-sub">ABSENT</div>
        </div>
        <div class="stat-card info" style="grid-column:1/-1;">
            <div class="stat-label">总出勤率</div>
            <div class="stat-value" th:text="${statistics.rangeAttendanceRate + '%'}">0%</div>
        </div>
    </div>

    <!-- 图表 -->
    <div class="card" th:if="${statistics != null and !#lists.isEmpty(statistics.weeklyStatistics)}">
        <div class="card-header">📈 出勤率趋势图</div>
        <div class="card-body">
            <canvas id="attendanceChart" height="100"></canvas>
        </div>
    </div>

    <!-- 按周统计 -->
    <div class="card" th:if="${statistics != null}">
        <div class="card-header">📅 按周统计</div>
        <div class="card-body">
            <div class="table-responsive">
                <table>
                    <thead>
                    <tr>
                        <th>周区间</th>
                        <th>总次数</th>
                        <th>出勤</th>
                        <th>缺勤</th>
                        <th>出勤率</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${statistics.weeklyStatistics}">
                        <td th:text="${item.label}"></td>
                        <td th:text="${item.totalCount}"></td>
                        <td th:text="${item.presentCount}"></td>
                        <td th:text="${item.absentCount}"></td>
                        <td><span class="badge badge-success" th:text="${item.attendanceRate + '%'}"></span></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(statistics.weeklyStatistics)}">
                        <td colspan="5" style="text-align:center;color:var(--text-sub);padding:30px;">暂无数据</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 按月统计 -->
    <div class="card" th:if="${statistics != null}">
        <div class="card-header">📅 按月统计</div>
        <div class="card-body">
            <div class="table-responsive">
                <table>
                    <thead>
                    <tr>
                        <th>月份</th>
                        <th>总次数</th>
                        <th>出勤</th>
                        <th>缺勤</th>
                        <th>出勤率</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${statistics.monthlyStatistics}">
                        <td th:text="${item.label}"></td>
                        <td th:text="${item.totalCount}"></td>
                        <td th:text="${item.presentCount}"></td>
                        <td th:text="${item.absentCount}"></td>
                        <td><span class="badge badge-success" th:text="${item.attendanceRate + '%'}"></span></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(statistics.monthlyStatistics)}">
                        <td colspan="5" style="text-align:center;color:var(--text-sub);padding:30px;">暂无数据</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</div>

<div th:replace="~{fragments/common :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script th:if="${statistics != null and !#lists.isEmpty(statistics.weeklyStatistics)}">
    (function() {
        const labels = [
            th:each="item : ${statistics.weeklyStatistics}" th:text="'${item.label}'" th:remove="tag"
        ];
        const rates = [
            th:each="item : ${statistics.weeklyStatistics}" th:text="${item.attendanceRate}" th:remove="tag"
        ];
        const ctx = document.getElementById('attendanceChart');
        if (ctx) {
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [/*[[${#strings.listJoin(statistics.weeklyStatistics.![label], ',')}]]*/],
                    datasets: [{
                        label: '出勤率 (%)',
                        data: [/*[[${#strings.listJoin(statistics.weeklyStatistics.![attendanceRate], ',')}]]*/],
                        backgroundColor: 'rgba(79, 70, 229, 0.6)',
                        borderColor: '#4f46e5',
                        borderWidth: 2,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, max: 100 }
                    },
                    plugins: {
                        legend: { display: true }
                    }
                }
            });
        }
    })();
</script>
</body>
</html>
