<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('考勤记录')}"></head>
<body>
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="page-shell">
    <div class="container">
        <div class="card">
            <div class="card-header">📋 考勤记录</div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="card" style="margin-bottom:20px;">
                <form th:action="@{/attendance/list}" method="get" class="grid-4">
                    <div class="form-group">
                        <label class="form-label">开始日期</label>
                        <input type="date" class="form-input" name="startDate" th:value="${startDate}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">结束日期</label>
                        <input type="date" class="form-input" name="endDate" th:value="${endDate}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">状态</label>
                        <select class="form-input" name="status">
                            <option value="">全部状态</option>
                            <option value="NORMAL" th:selected="${status == 'NORMAL'}">正常</option>
                            <option value="LATE" th:selected="${status == 'LATE'}">迟到</option>
                            <option value="EARLY" th:selected="${status == 'EARLY'}">早退</option>
                            <option value="ABSENT" th:selected="${status == 'ABSENT'}">缺勤</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">课程</label>
                        <select class="form-input" name="courseId">
                            <option value="">全部课程</option>
                            <option th:each="course : ${courses}"
                                    th:value="${course.id}"
                                    th:text="${course.courseName}"
                                    th:selected="${courseId != null and courseId == course.id}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">快速筛选</label>
                        <select class="form-input" name="quickRange">
                            <option value="">请选择</option>
                            <option value="today" th:selected="${quickRange == 'today'}">今天</option>
                            <option value="week" th:selected="${quickRange == 'week'}">本周</option>
                            <option value="month" th:selected="${quickRange == 'month'}">本月</option>
                        </select>
                    </div>
                    <div class="form-group d-flex align-center" style="gap:8px;padding-top:24px;">
                        <button class="btn btn-primary" type="submit">🔍 查询</button>
                        <a class="btn btn-success"
                           th:href="@{/attendance/export(startDate=${startDate},endDate=${endDate},status=${status},courseId=${courseId},quickRange=${quickRange})}">
                            ⬇ 导出
                        </a>
                        <a class="btn btn-info" th:href="@{/attendance/statistics}">📊 统计</a>
                    </div>
                </form>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                    <tr>
                        <th>日期</th>
                        <th>课程名称</th>
                        <th>签到时间</th>
                        <th>签退时间</th>
                        <th>状态</th>
                        <th>早退</th>
                        <th>备注</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="record : ${records}">
                        <td th:text="${#temporals.format(record.attendanceDate, 'yyyy-MM-dd')}"></td>
                        <td th:text="${courseMap.get(record.courseId) != null ? courseMap.get(record.courseId) : record.courseId}"></td>
                        <td th:text="${record.checkInTime != null ? #temporals.format(record.checkInTime, 'HH:mm:ss') : ''}"></td>
                        <td th:text="${record.checkOutTime != null ? #temporals.format(record.checkOutTime, 'HH:mm:ss') : ''}"></td>
                        <td>
                            <span th:switch="${record.status}">
                                <span th:case="'NORMAL'" class="badge badge-success">正常</span>
                                <span th:case="'LATE'" class="badge badge-warning">迟到</span>
                                <span th:case="'EARLY'" class="badge badge-info">早退</span>
                                <span th:case="'ABSENT'" class="badge badge-danger">缺勤</span>
                                <span th:case="*" class="badge badge-secondary">未知</span>
                            </span>
                        </td>
                        <td th:text="${record.earlyLeave != null and record.earlyLeave ? '是' : '否'}"></td>
                        <td th:text="${record.remark}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(records)}">
                        <td colspan="7" style="text-align:center;color:var(--text-sub);padding:40px;">暂无考勤记录</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav style="margin-top:20px;display:flex;justify-content:center;gap:6px;" th:if="${totalPages > 1}">
                <a th:each="i : ${#numbers.sequence(1, totalPages)}"
                   th:if="${i == currentPage}"
                   style="padding:6px 14px;background:var(--primary);color:#fff;border-radius:6px;text-decoration:none;font-size:14px;"
                   th:text="${i}"></a>
                <a th:each="i : ${#numbers.sequence(1, totalPages)}"
                   th:if="${i != currentPage}"
                   th:href="@{/attendance/list(page=${i}, startDate=${startDate}, endDate=${endDate}, status=${status}, courseId=${courseId}, quickRange=${quickRange})}"
                   style="padding:6px 14px;background:#f3f4f6;color:var(--text-main);border-radius:6px;text-decoration:none;font-size:14px;"
                   th:text="${i}"></a>
            </nav>
        </div>
    </div>
</div>

<div th:replace="~{fragments/common :: footer}"></div>
</body>
</html>
