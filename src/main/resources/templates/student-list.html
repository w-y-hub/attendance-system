<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学生列表</title>
    <link rel="stylesheet"
          th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">
    <h2>学生列表</h2>

    <a th:href="@{/student/add}" class="btn btn-success mb-3">新增学生</a>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>学号</th>
            <th>姓名</th>
            <th>班级</th>
            <th>性别</th>
            <th>出生日期</th>
            <th>手机号</th>
            <th>邮箱</th>
            <th>状态</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="student : ${students}">
            <td th:text="${student.id}">1</td>
            <td th:text="${student.studentNo}">2023001</td>
            <td th:text="${student.name}">张三</td>
            <td th:text="${student.className}">软件工程1班</td>
            <td th:text="${student.gender}">男</td>
            <td th:text="${student.birthDate}">2003-01-01</td>
            <td th:text="${student.phone}">13800000000</td>
            <td th:text="${student.email}">test@example.com</td>
            <td th:text="${student.status == 1 ? '正常' : '禁用'}">正常</td>
            <td>
                <a class="btn btn-sm btn-info"
                   th:href="@{/student/edit/{id}(id=${student.id})}">编辑</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
