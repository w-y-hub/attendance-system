<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">登录</title>
</head>
<body>
<h1 th:text="${title}">用户登录</h1>

<p th:if="${param.error}" style="color:red;">用户名或密码错误</p>
<p th:if="${param.logout}" style="color:green;">退出成功</p>
<p th:if="${param.registerSuccess}" style="color:green;">注册成功，请登录</p>

<form action="/doLogin" method="post">
    <div>
        <label>用户名：</label>
        <input type="text" name="username" required>
    </div>
    <div>
        <label>密码：</label>
        <input type="password" name="password" required>
    </div>
    <div>
        <button type="submit">登录</button>
    </div>
</form>

<p><a th:href="@{/register}">去注册</a></p>
</body>
</html>
