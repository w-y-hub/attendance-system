<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-auth">

<div class="background-shape shape1"></div>
<div class="background-shape shape2"></div>

<div class="auth-card">
    <!-- 左侧装饰区 -->
    <div class="auth-left">
        <div class="auth-left-content">
            <div class="auth-icon">📋</div>
            <h1>考勤管理系统</h1>
            <p class="auth-desc">高效管理班级考勤，实时掌握出勤动态。<br>请登录以继续使用系统。</p>
            <div class="auth-features">
                <span>✅ 在线打卡</span>
                <span>📊 统计报表</span>
                <span>📥 批量导入</span>
            </div>
        </div>
    </div>

    <!-- 右侧表单区 -->
    <div class="auth-right">
        <h2 class="auth-title">欢迎回来</h2>
        <p class="auth-subtitle">请登录您的账号</p>

        <!-- 错误提示 -->
        <div class="error-message" th:if="${param.error != null}">
            ⚠ 用户名或密码错误，请重试
        </div>
        <div class="success-message" th:if="${param.logout != null}">
            ✅ 您已成功退出
        </div>
        <div class="success-message" th:if="${successMsg}" th:text="${successMsg}"></div>

        <form th:action="@{/doLogin}" method="post" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <div class="form-input-wrapper">
                    <input id="username" name="username" type="text" class="form-input" placeholder="请输入用户名" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <div class="form-input-wrapper">
                    <input id="password" name="password" type="password" class="form-input" placeholder="请输入密码" required>
                    <span class="toggle-password" onclick="togglePassword()">显示</span>
                </div>
            </div>

            <button type="submit" class="login-btn">立即登录</button>
        </form>

        <div class="bottom-text">
            还没有账号？
            <a th:href="@{/register}">立即注册</a>
        </div>

        <div class="copyright">
            &copy; 2025 Attendance System
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.querySelector('.toggle-password');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleBtn.textContent = '隐藏';
        } else {
            passwordInput.type = 'password';
            toggleBtn.textContent = '显示';
        }
    }
</script>
</body>
</html>
