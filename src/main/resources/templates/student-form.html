<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">学生表单</title>
    <link rel="stylesheet"
          th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">
    <h2 th:text="${title}">学生表单</h2>

    <form th:action="${student.id} == null ? @{/student/save} : @{/student/update}"
          th:object="${student}"
          method="post"
          class="mt-4">

        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">学号</label>
            <input type="text" th:field="*{studentNo}" class="form-control"/>
            <div class="text-danger" th:if="${#fields.hasErrors('studentNo')}" th:errors="*{studentNo}"></div>
            <div class="text-danger" th:if="${studentNoError}" th:text="${studentNoError}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">姓名</label>
            <input type="text" th:field="*{name}" class="form-control"/>
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">班级</label>
            <input type="text" th:field="*{className}" class="form-control"/>
            <div class="text-danger" th:if="${#fields.hasErrors('className')}" th:errors="*{className}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">性别</label>
            <select th:field="*{gender}" class="form-select">
                <option value="">请选择</option>
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">出生日期</label>
            <input type="date" th:field="*{birthDate}" class="form-control"/>
            <div class="text-danger" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">手机号</label>
            <input type="text" th:field="*{phone}" class="form-control"/>
            <div class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">邮箱</label>
            <input type="email" th:field="*{email}" class="form-control"/>
            <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">状态</label>
            <select th:field="*{status}" class="form-select">
                <option th:value="1">正常</option>
                <option th:value="0">禁用</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">保存</button>
        <a th:href="@{/student/list}" class="btn btn-secondary">返回列表</a>
    </form>
</div>
</body>
</html>
