<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('考勤打卡')}"></head>
<body class="gradient-bg">
<div class="background-shape shape1"></div>
<div class="background-shape shape2"></div>

<div th:replace="~{fragments/common :: navbar}" style="position:relative;z-index:2;"></div>

<div class="page-shell" style="position:relative;z-index:1;">
    <div class="container checkin-shell">
        <!-- 提示消息 -->
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="checkin-grid">
            <!-- 签到面板 -->
            <div class="checkin-panel">
                <div class="panel-header">
                    <div class="panel-title">✅ 签到</div>
                    <p class="panel-subtitle">选择课程完成签到（上课前15分钟到上课后30分钟内有效）</p>
                </div>
                <form th:action="@{/attendance/checkIn}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="form-group">
                        <label class="form-label">选择课程</label>
                        <select name="courseId" class="form-input" required>
                            <option value="">请选择课程</option>
                            <option th:each="course : ${courses}"
                                    th:value="${course.id}"
                                    th:text="${course.courseName + ' (' + course.startTime + ' - ' + course.endTime + ')'}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">备注（可选）</label>
                        <input type="text" name="remark" class="form-input" placeholder="如：正常到课">
                    </div>
                    <button type="submit" class="btn-checkin">立即签到</button>
                </form>
            </div>

            <!-- 签退面板 -->
            <div class="checkin-panel">
                <div class="panel-header">
                    <div class="panel-title">⬅ 签退</div>
                    <p class="panel-subtitle">完成课程后在此签退</p>
                </div>
                <form th:action="@{/attendance/checkOut}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="form-group">
                        <label class="form-label">选择课程</label>
                        <select name="courseId" class="form-input" required>
                            <option value="">请选择课程</option>
                            <option th:each="course : ${courses}"
                                    th:value="${course.id}"
                                    th:text="${course.courseName + ' (' + course.startTime + ' - ' + course.endTime + ')'}"></option>
                        </select>
                    </div>
                    <button type="submit" class="btn-checkout">立即签退</button>
                </form>
                <div class="section-note">提示：签退前请确认课程已结束，提交后系统会自动记录签退时间。</div>
            </div>
        </div>

        <!-- 操作说明 -->
        <div class="tips-card">
            <h3 class="tips-title">📌 操作说明</h3>
            <ul class="tips-list">
                <li>签到时请选择当前实际参加的课程，避免错误记录。</li>
                <li>如遇特殊情况，可在备注中补充说明，方便后续核查。</li>
                <li>签退后可在考勤记录页面查看自己的完整打卡信息。</li>
                <li>若页面未显示课程，请联系管理员检查课程配置。</li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
