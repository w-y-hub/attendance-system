<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('考勤打卡')}"></head>
<body>
<!-- ===== 导航栏放在最顶部 ===== -->
<div th:replace="~{fragments/common :: navbar}"></div>

<!-- ===== 渐变背景内容区 ===== -->
<div style="background:linear-gradient(135deg, #667eea, #764ba2);min-height:calc(100vh - 64px);padding:28px 20px 40px;position:relative;">
    <div class="background-shape shape1"></div>
    <div class="background-shape shape2"></div>

    <div class="container checkin-shell" style="position:relative;z-index:1;">
        <!-- 提示消息 -->
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="checkin-grid">
            <!-- ===== 签到面板（始终显示） ===== -->
            <div class="checkin-panel">
                <div class="panel-header">
                    <div class="panel-title">✅ 签到</div>
                    <p class="panel-subtitle">选择课程完成签到（课前15分钟到课后30分钟内有效）</p>
                </div>
                <form th:action="@{/attendance/checkIn}" method="post">
                    <div class="form-group">
                        <label class="form-label">选择课程</label>
                        <select name="courseId" class="form-input" required>
                            <option value="">请选择课程</option>
                            <option th:each="course : ${courses}"
                                    th:value="${course.id}"
                                    th:text="${course.courseName + ' (' + course.startTime + ' - ' + course.endTime + ')'}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">备注（可选）</label>
                        <input type="text" name="remark" class="form-input" placeholder="如：正常到课">
                    </div>
                    <button type="submit" class="btn-checkin">立即签到</button>
                </form>
            </div>

            <!-- ===== 签退面板（仅当有已签到课程时才显示） ===== -->
            <div class="checkin-panel" th:if="${hasCheckIn}">
                <div class="panel-header">
                    <div class="panel-title">⬅ 签退</div>
                    <p class="panel-subtitle">完成课程后在此签退（仅显示已签到的课程）</p>
                </div>
                <form th:action="@{/attendance/checkOut}" method="post">
                    <div class="form-group">
                        <label class="form-label">选择已签到的课程</label>
                        <select name="courseId" class="form-input" required>
                            <option value="">请选择课程</option>
                            <!--
                                 只显示今天已签到的课程（从 todayRecords 中取）
                                 courseMap 用于把 courseId 转换成课程名称
                            -->
                            <option th:each="rec : ${todayRecords}"
                                    th:value="${rec.courseId}"
                                    th:text="${courseNameMap.get(rec.courseId) != null ? courseNameMap.get(rec.courseId) + ' (' + rec.checkInTime + ')' : '课程ID: ' + rec.courseId}"></option>
                        </select>
                    </div>
                    <button type="submit" class="btn-checkout">立即签退</button>
                </form>
                <div class="section-note">提示：签退时间早于课程结束时间将标记为"早退"。</div>
            </div>

            <!-- ===== 未签到时签退面板的占位提示 ===== -->
            <div class="checkin-panel" th:if="${!hasCheckIn}" style="display:flex;align-items:center;justify-content:center;min-height:200px;">
                <div style="text-align:center;color:var(--text-sub);">
                    <div style="font-size:48px;margin-bottom:12px;">⏳</div>
                    <p>请先签到，签退面板会在签到后自动出现</p>
                </div>
            </div>
        </div>

        <!-- 操作说明 -->
        <div class="tips-card">
            <h3 class="tips-title">📌 操作说明</h3>
            <ul class="tips-list">
                <li>签到时请选择当前实际参加的课程，避免错误记录。</li>
                <li>签到后签退面板会自动出现，下拉菜单只显示已签到的课程。</li>
                <li>签退后可在考勤记录页面查看自己的完整打卡信息。</li>
                <li>若页面未显示课程，请联系管理员检查课程配置。</li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
