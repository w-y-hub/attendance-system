<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('导入学生')}"></head>
<body>
<div th:replace="~{fragments/common :: navbar}"></div>

<div class="page-shell">
    <div class="container">
        <!-- 标题 -->
        <div style="margin-bottom:24px;">
            <h2 style="color:var(--text-main);">📥 导入学生</h2>
            <p style="color:var(--text-sub);">通过 Excel 文件批量导入学生信息</p>
        </div>

        <!-- 错误提示 -->
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="card">
            <h3 class="card-title">上传 Excel 文件</h3>
            <p class="card-subtitle">选择包含学生信息的 .xlsx 文件进行批量导入</p>

            <div style="margin-top:20px;padding:22px;background:#f9fafb;border:2px dashed #c7d2fe;border-radius:14px;">
                <form th:action="@{/student/import}" method="post" enctype="multipart/form-data" onsubmit="return showProgress()">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="form-group">
                        <label class="form-label" for="fileInput">选择文件</label>
                        <input id="fileInput" name="file" type="file" class="form-input" accept=".xlsx" required>
                    </div>

                    <div style="display:flex;gap:12px;align-items:center;margin-top:16px;">
                        <button id="submitBtn" type="submit" class="btn btn-primary">📤 开始上传</button>
                        <a th:href="@{/student/list}" class="btn btn-secondary">返回列表</a>
                    </div>
                </form>
            </div>

            <!-- 进度条 -->
            <div id="progressSection" style="display:none;margin-top:16px;">
                <div style="font-size:13px;color:var(--text-sub);margin-bottom:6px;">正在导入...</div>
                <div style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;">
                    <div id="progressBar" style="height:100%;width:0%;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:4px;transition:width 0.3s;text-align:center;font-size:10px;line-height:8px;color:#fff;"></div>
                </div>
            </div>
        </div>

        <!-- 导入结果 -->
        <div class="card" th:if="${result != null}">
            <h3 class="card-title">导入结果</h3>
            <div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:16px;">
                <div class="stat-card primary" style="flex:1;min-width:140px;">
                    <div class="stat-label">总记录数</div>
                    <div class="stat-value" th:text="${result.totalCount}">0</div>
                </div>
                <div class="stat-card success" style="flex:1;min-width:140px;">
                    <div class="stat-label">成功</div>
                    <div class="stat-value" th:text="${result.successCount}">0</div>
                </div>
                <div class="stat-card danger" style="flex:1;min-width:140px;">
                    <div class="stat-label">失败</div>
                    <div class="stat-value" th:text="${result.failCount}">0</div>
                </div>
            </div>
            <div style="margin-top:16px;" th:if="${not #lists.isEmpty(result.errorMessages)}">
                <h4 style="font-size:14px;color:var(--danger-text);margin-bottom:8px;">错误详情：</h4>
                <ul style="padding-left:20px;">
                    <li th:each="msg : ${result.errorMessages}" th:text="${msg}" style="font-size:13px;color:var(--text-sub);margin-bottom:4px;"></li>
                </ul>
                <button class="btn btn-danger" style="margin-top:12px;" onclick="downloadErrorReport()">⬇ 下载失败报告</button>
            </div>
        </div>

        <!-- 模板说明 -->
        <div class="card">
            <h3 class="card-title">📄 Excel 模板说明</h3>
            <div style="margin-top:12px;">
                <div class="template-hints">
                    <h4>字段顺序（按列）</h4>
                    <div class="template-line">学号 | 姓名 | 性别 | 学院 | 年级 | 专业 | 班级</div>
                    <div class="template-line">示例：42211077 | 孙涛涛 | 男 | 计算机与人工智能学院 | 2022 | 计算机科学与技术 | 2022级计算机科学与技术</div>
                    <div class="template-line" style="color:var(--warning-text);">注意：性别只能是"男"或"女"</div>
                    <div class="highlight">支持 .xlsx 格式，单文件不超过 10MB，第一行为表头</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/common :: footer}"></div>

<script>
    function downloadErrorReport() {
        var errors = [];
        var items = document.querySelectorAll("ul li");
        items.forEach(function(li) { errors.push(li.textContent); });
        if (errors.length === 0) return;
        var csv = "错误信息\n" + errors.join("\n");
        var blob = new Blob(["\ufeff" + csv], {type: "text/csv;charset=utf-8"});
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "导入失败报告.csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
    }

    function showProgress() {
        var fileInput = document.getElementById("fileInput");
        if (!fileInput.files || fileInput.files.length === 0) {
            alert("请选择文件");
            return false;
        }
        document.getElementById("submitBtn").disabled = true;
        document.getElementById("submitBtn").innerText = "上传中...";
        document.getElementById("progressSection").style.display = "block";
        var bar = document.getElementById("progressBar");
        var w = 0;
        setInterval(function () {
            if (w < 90) {
                w += Math.random() * 15;
                if (w > 90) w = 90;
                bar.style.width = w + "%";
                bar.innerText = Math.round(w) + "%";
            }
        }, 500);
        return true;
    }
</script>
</body>
</html>
