<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('系统首页')}"></head>
<body>

<div th:replace="~{fragments/common :: navbar}"></div>

<div class="page-shell">
    <div class="container">
        <!-- 欢迎卡片 -->
        <div class="welcome-card">
            <h2>👋 欢迎回来，<span th:text="${username}">用户</span></h2>
            <p style="color:var(--text-sub);margin-top:4px;">这是您的考勤管理控制台</p>
            <div class="info-row">
                <div class="info-box">
                    <div class="label">当前学期课程数</div>
                    <div class="value" th:text="${courseCount}">0</div>
                </div>
                <div class="info-box" style="border-left-color:var(--success);">
                    <div class="label">今日状态</div>
                    <div class="value" style="font-size:18px;">⬇ 请从下方功能进入</div>
                </div>
            </div>
        </div>

        <!-- 功能快捷入口 -->
        <h3 style="font-size:18px;font-weight:600;color:var(--text-main);margin-bottom:4px;">📌 功能快捷入口</h3>
        <p style="color:var(--text-sub);font-size:13px;margin-bottom:16px;">选择一项功能开始操作</p>

        <div class="module-grid">
            <!-- 考勤打卡（仅 STUDENT 可见） -->
            <a th:if="${userRole == 'STUDENT'}" th:href="@{/attendance/checkIn}" class="module-card">
                <div class="module-icon" style="background:#eef2ff;color:var(--primary);">📌</div>
                <h3>考勤打卡</h3>
                <p>选择课程进行签到或签退操作。</p>
            </a>

            <!-- 考勤记录（STUDENT 看自己的，ADMIN 看全部的） -->
            <a th:href="@{/attendance/list}" class="module-card">
                <div class="module-icon" style="background:#ecfdf3;color:var(--success);">📋</div>
                <h3 th:text="${userRole == 'ADMIN' ? '全部考勤' : '我的考勤'}">考勤记录</h3>
                <p>查看考勤记录，支持多条件筛选。</p>
            </a>

            <a th:href="@{/attendance/statistics}" class="module-card">
                <div class="module-icon" style="background:#faf5ff;color:var(--secondary);">📊</div>
                <h3>考勤统计</h3>
                <p>按周/月度查看出勤率和统计图表。</p>
            </a>

            <!-- 考勤导入（仅 ADMIN/TEACHER 可见） -->
            <a th:if="${userRole == 'ADMIN' or userRole == 'TEACHER'}" th:href="@{/attendance/import}" class="module-card">
                <div class="module-icon" style="background:#fff7ed;color:#c2410c;">📥</div>
                <h3>考勤导入</h3>
                <p>通过 Excel 批量导入考勤记录。</p>
            </a>

            <!-- 学生管理（仅 ADMIN 可见） -->
            <a th:if="${userRole == 'ADMIN'}" th:href="@{/student/list}" class="module-card">
                <div class="module-icon" style="background:#f0f9ff;color:var(--info);">👥</div>
                <h3>学生管理</h3>
                <p>查看、新增、编辑和导入学生信息。</p>
            </a>

            <form th:action="@{/logout}" method="post" style="display:contents;">
                <button type="submit" class="module-card" style="border-color:#fecaca;cursor:pointer;width:100%;text-align:left;font-family:inherit;font-size:inherit;">
                    <div class="module-icon" style="background:#fef2f2;color:var(--danger);">🚪</div>
                    <h3>退出登录</h3>
                    <p>安全退出当前账号，返回登录页面。</p>
                </button>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/common :: footer}"></div>

</body>
</html>
